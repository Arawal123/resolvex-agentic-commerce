name: Bug report
description: Report a reproducible ResolveX defect
title: "[bug] "
labels: [bug]
body:
  - type: textarea
    id: behavior
    attributes:
      { label: Observed behavior, description: Include the case, route, and visible failure. }
    validations: { required: true }
  - type: textarea
    id: expected
    attributes: { label: Expected behavior }
    validations: { required: true }
  - type: textarea
    id: evidence
    attributes:
      {
        label: Evidence,
        description: Include safe logs,
        decision IDs,
        or screenshots without customer secrets.,
      }
  - type: dropdown
    id: mode
    attributes: { label: Runtime mode, options: [Deterministic sandbox, Live hybrid, Unknown] }
