services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: resolvex
      POSTGRES_PASSWORD: resolvex
      POSTGRES_DB: resolvex
    ports:
      - "5432:5432"
    volumes:
      - resolvex_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resolvex"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  resolvex_pg:
